ktor {
    deployment {
        port = 8081
        port = ${?PORT}
        # watch = [ classes, resources ]  # включать только локально для hot-reload
    }
    application {
        modules = [ com.eva.ApplicationKt.module ]
    }
}

database {
    driver      = "org.postgresql.Driver"
    url         = "jdbc:postgresql://127.0.0.1:5433/eva_database"
    url         = ${?DB_URL}
    user        = "eva_user"
    password    = "eva_secret_pass"
    password    = ${?DB_PASSWORD}
    maxPoolSize = 10
}

app {
    # Таймзона для бизнес-логики (фильтрация слотов, проверка отмены за 24ч)
    timezone = "Europe/Moscow"
    timezone = ${?APP_TIMEZONE}
}

jwt {
    secret   = "eva-jwt-super-secret-key-change-in-production-min-32-chars"
    secret   = ${?JWT_SECRET}
    issuer   = "eva-backend"
    audience = "eva-mobile-client"
    realm    = "EVA API"
    # Срок жизни access-токена: 1 час (в миллисекундах). Refresh-токен живёт 30 дней.
    expirationMs = 3600000
}

yandex {
    apiKey   = ${?YANDEX_API_KEY}
    folderId = "b1goiiftdomnctqk6icb"
    promptId = "fvtpqrk6l0k5aufccdhl"
}

fcm {
    # Путь к JSON-ключу сервисного аккаунта Firebase
    # Получить в Firebase Console → Project Settings → Service accounts
    credentialsPath = "src/main/resources/firebase-service-account.json"
    credentialsPath = ${?FCM_CREDENTIALS_PATH}
}
