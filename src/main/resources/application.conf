ktor {
    deployment {
        port = 8081
        port = ${?PORT}
        watch = [ classes, resources ]
    }
    application {
        modules = [ com.eva.ApplicationKt.module ]
    }
}

database {
    driver   = "org.postgresql.Driver"
    url      = "jdbc:postgresql://127.0.0.1:5433/eva_database"
    url      = ${?DB_URL}
    user     = "eva_user"
    password = "eva_secret_pass"
    maxPoolSize = 10
}

jwt {
    secret   = "eva-jwt-super-secret-key-change-in-production-min-32-chars"
    secret   = ${?JWT_SECRET}
    issuer   = "eva-backend"
    audience = "eva-mobile-client"
    realm    = "EVA API"
    # Срок жизни access-токена: 24 часа (в миллисекундах)
    expirationMs = 86400000
}

openai {
    apiKey = ${?OPENAI_API_KEY}
    model  = "gpt-4o-mini"
}

fcm {
    # Путь к JSON-ключу сервисного аккаунта Firebase
    # Получить в Firebase Console → Project Settings → Service accounts
    credentialsPath = "src/main/resources/firebase-service-account.json"
    credentialsPath = ${?FCM_CREDENTIALS_PATH}
}
